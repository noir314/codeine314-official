<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODEINE314 | OFFICIAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }
        // Apply theme on load
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        .dark body { background: radial-gradient(circle at top right, #1a1025, #050505 70%); }
        body { background: #f4f4f4; color: #111; transition: background 0.3s ease; }
    </style>
</head>
<body class="dark:text-zinc-100 font-mono">

        <span class="text-xl font-black tracking-tighter text-purple-500">C314</span>
        <div class="flex items-center space-x-6">
            <button onclick="toggleTheme()" class="text-xl hover:scale-110 transition cursor-pointer">
                <span class="dark:hidden">🌙</span><span class="hidden dark:inline">☀️</span>
            </button>
            <div class="space-x-4 text-[10px] uppercase tracking-widest font-bold">
                <a href="#music" class="hover:text-purple-400">Audio</a>
                <a href="pharmacy.html" class="text-red-500 hover:text-red-400">21+</a>

    </nav>

    <main class="max-w-4xl mx-auto px-6 pb-24 space-y-12">

            </div>
            <div class="bg-white dark:bg-zinc-900/40 border border-zinc-200 dark:border-zinc-800 p-8 rounded-3xl flex flex-col justify-center text-center italic">

                <div class="h-1.5 w-full bg-zinc-200 dark:bg-zinc-800 rounded-full"><div class="h-full bg-purple-600 w-3/4 animate-pulse"></div></div>

        </section>
    </main>

    <footer class="border-t border-zinc-200 dark:border-zinc-800 p-12 text-center space-y-8">

</body>
</html>
