<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODEINE314 | OFFICIAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { margin: 0; overflow-x: hidden; transition: background 0.3s ease; }
        .dark body { background: #050505; color: #fff; }
        body { background: #f4f4f4; color: #111; }
        
        #mushroomCanvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; opacity: 0.6;
        }

        #drawer {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }
        .drawer-closed { transform: translateX(-100%); }
        .drawer-open { transform: translateX(0); }
    </style>
</head>
<body class="font-mono">

    <canvas id="mushroomCanvas"></canvas>

    <button onclick="toggleDrawer()" class="fixed top-6 left-6 z-[110] text-2xl p-3 bg-purple-600 text-white rounded-xl shadow-lg active:scale-90 transition">
        <i class="fas fa-bars"></i>
    </button>

    <div id="drawer" class="fixed top-0 left-0 h-full w-72 bg-zinc-950 border-r border-purple-900/50 p-8 drawer-closed flex flex-col justify-between">
        <div class="space-y-8 mt-20">
            <h2 class="text-purple-500 font-black text-2xl tracking-tighter italic">C314</h2>
            <nav class="flex flex-col space-y-6 text-sm font-bold uppercase tracking-widest text-white">
                <a href="index.html" class="hover:text-purple-400">Audio Catalog</a>
                <a href="#merch" onclick="toggleDrawer()" class="hover:text-purple-400">Merch Drop</a>
                <a href="pharmacy.html" class="text-red-500 hover:text-red-400">Pharmacy 21+</a>
                <a href="https://cash.app/$Dimo314" class="text-green-500">Support</a>
            </nav>
        </div>
        
        <button onclick="toggleTheme()" class="text-left py-6 border-t border-zinc-800 text-xs uppercase font-black text-zinc-500">
            <span class="dark:hidden text-white">🌙 Dark Mode</span><span class="hidden dark:inline">☀️ Light Mode</span>
        </button>
    </div>

    <main class="max-w-4xl mx-auto px-6 pt-32 pb-24 text-center relative">
        <header class="mb-12">
            <h1 class="text-6xl md:text-8xl font-black italic tracking-tighter mb-4 uppercase mix-blend-difference dark:text-white">Codeine314</h1>
            <p class="text-zinc-500 text-[10px] uppercase tracking-[0.4em]">Midnight Medicine • 2026</p>
        </header>
        
        <section id="music" class="my-12">
            <div class="bg-white dark:bg-zinc-900/40 border-4 border-zinc-800 p-2 rounded-3xl backdrop-blur-md shadow-2xl">
                <iframe class="w-full aspect-video rounded-xl" src="https://www.youtube.com/embed/videoseries?list=PL8n2dqw2Zkm6JrWURWUHk-fa43zailEiu" frameborder="0"></iframe>
            </div>
        </section>

        <section id="merch" class="py-10">
            <div class="bg-purple-700 p-12 rounded-[3rem] text-white font-black italic uppercase shadow-xl">
                <h2 class="text-4xl mb-2">THE DRIP</h2>
                <p class="text-[10px] mb-8 opacity-60 tracking-widest">Official Gear</p>
                <a href="https://cash.app/$Dimo314" class="bg-black text-white px-10 py-4 rounded-full inline-block">Order via CashApp</a>
            </div>
        </section>
    </main>

    <footer class="p-16 text-center space-y-10 border-t border-zinc-200 dark:border-zinc-900">
        <div class="flex justify-center flex-wrap gap-8 text-3xl text-zinc-400 dark:text-zinc-700">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
            <a href="#"><i class="fab fa-discord"></i></a>
            <a href="#"><i class="fab fa-snapchat"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
        <p class="text-[9px] tracking-[0.6em] text-zinc-500 uppercase">Codeine314 • 2026</p>
    </footer>

    <script>
        function toggleDrawer() {
            const drawer = document.getElementById('drawer');
            drawer.classList.toggle('drawer-closed');
            drawer.classList.toggle('drawer-open');
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');

        // Bouncing Mushrooms
        const canvas = document.getElementById('mushroomCanvas');
        const ctx = canvas.getContext('2d');
        let m = [];
        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            m = [];
            for(let i=0; i<15; i++) {
                m.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, vx:(Math.random()-0.5)*2.5, vy:(Math.random()-0.5)*2.5});
            }
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.font = "35px serif";
            m.forEach(p => {
                ctx.fillText("🍄", p.x, p.y);
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx*=-1;
                if(p.y<0 || p.y>canvas.height) p.vy*=-1;
            });
            requestAnimationFrame(draw);
        }
        init(); draw();
        window.addEventListener('resize', init);
    </script>
</body>
</html>
