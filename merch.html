<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C314 | SUPPLY</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #050505; color: #fff; font-family: monospace; }
        .glass-card {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
        }
        .glass-card:hover {
            border-color: #a855f7;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.2);
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="pb-24">

    <header class="p-8 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-xl z-50">
        <a href="index.html" class="text-2xl"><i class="fas fa-arrow-left"></i></a>
        <h1 class="text-2xl font-black italic tracking-tighter text-purple-500 uppercase">C314 Supply</h1>
        <div class="w-10"></div>
    </header>

    <main class="max-w-6xl mx-auto px-6 mt-12 grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="glass-card rounded-[3rem] p-10 flex flex-col items-center text-center">
            <div class="w-full aspect-square bg-zinc-900 rounded-[2rem] mb-8 flex items-center justify-center text-8xl shadow-inner">👕</div>
            <h3 class="text-2xl font-black uppercase italic mb-2">Founding Member Tee</h3>
            <p class="text-zinc-500 text-xs mb-8 tracking-widest uppercase">Limited Midnight Edition</p>
            <button onclick="openIceVault('Founding Member Tee', 45)" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-purple-600 hover:text-white transition shadow-xl active:scale-95">
                Secure Checkout 🥶
            </button>
        </div>

        <div class="glass-card rounded-[3rem] p-10 flex flex-col items-center text-center">
            <div class="w-full aspect-square bg-zinc-900 rounded-[2rem] mb-8 flex items-center justify-center text-8xl shadow-inner">🧢</div>
            <h3 class="text-2xl font-black uppercase italic mb-2">C314 Ghost Hat</h3>
            <p class="text-zinc-500 text-xs mb-8 tracking-widest uppercase">Frosty Embroidery</p>
            <button onclick="openIceVault('C314 Ghost Hat', 35)" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-purple-600 hover:text-white transition shadow-xl active:scale-95">
                Secure Checkout 🥶
            </button>
        </div>

    </main>

    <div id="payment-modal" class="fixed inset-0 z-[2000] hidden items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-xl" onclick="closeIceVault()"></div>
        <div class="relative bg-zinc-900/40 border border-white/20 backdrop-blur-3xl p-10 rounded-[3rem] w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black italic text-white uppercase">Secure Vault</h2>
                <p id="modal-item-name" class="text-purple-400 font-bold uppercase text-[10px] tracking-[0.3em] mt-2">ITEM NAME</p>
            </div>
            <div class="bg-white/5 border border-white/10 rounded-2xl p-6 mb-6 flex justify-between items-center">
                <span class="text-xs text-zinc-400 uppercase font-black">Total Due</span>
                <span id="modal-item-price" class="text-2xl font-black italic text-white">/data/data/com.termux/files/usr/bin/bash0</span>
            </div>
            <button class="w-full bg-purple-600 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-white hover:text-black transition active:scale-95">
                Confirm & Pay
            </button>
            <p class="text-[8px] text-zinc-600 text-center mt-6 uppercase tracking-widest">NFC • Apple Pay • Google Pay Active</p>
        </div>
    </div>

    <script src="merch-logic.js"></script>
</body>
</html>
