<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C314 | SUPPLY</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #050505; color: #fff; font-family: monospace; }
        .merch-card {
            background: #0f0f0f;
            border: 1px solid #1f1f1f;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .merch-card:hover {
            border-color: #a855f7;
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(168, 85, 247, 0.15);
        }
        .filter-btn.active { background: #a855f7; color: white; }
    </style>
</head>
<body class="pb-24">

    <header class="p-8 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-xl z-50">
        <a href="index.html" class="text-2xl"><i class="fas fa-arrow-left"></i></a>
        <h1 class="text-2xl font-black italic tracking-tighter">C314 SUPPLY</h1>
        <div class="relative">
            <i class="fas fa-shopping-cart text-xl"></i>
            <span class="absolute -top-2 -right-2 bg-purple-600 text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </div>
    </header>

    <div class="flex justify-center gap-4 mb-12 px-6">
        <button onclick="filterMerch('men')" class="filter-btn active border border-zinc-800 px-6 py-2 rounded-full text-xs font-black uppercase">Men's</button>
        <button onclick="filterMerch('women')" class="filter-btn border border-zinc-800 px-6 py-2 rounded-full text-xs font-black uppercase">Women's</button>
    </div>

    <main id="merch-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 px-6">
        </main>

    <script>
        const products = [
            // Men's Category
            { id: 1, cat: 'men', name: 'Midnight Tee', price: 35, img: '👕', type: 'Shirt' },
            { id: 2, cat: 'men', name: 'C314 Heavy Hoodie', price: 65, img: '🧥', type: 'Hoodie' },
            { id: 3, cat: 'men', name: 'Wicked Track Pants', price: 55, img: '👖', type: 'Pants' },
            { id: 4, cat: 'men', name: '314 Phantom Kicks', price: 120, img: '👟', type: 'Shoes' },
            { id: 5, cat: 'men', name: 'Medicine Socks', price: 15, img: '🧦', type: 'Socks' },
            { id: 6, cat: 'men', name: 'Logo Dad Hat', price: 30, img: '🧢', type: 'Hat' },
            
            // Women's Category
            { id: 7, cat: 'women', name: 'Vibe Crop Top', price: 30, img: '👕', type: 'Shirt' },
            { id: 8, cat: 'women', name: 'C314 Oversized Zip', price: 70, img: '🧥', type: 'Jacket' },
            { id: 9, cat: 'women', name: 'Street Joggers', price: 50, img: '👖', type: 'Pants' },
            { id: 10, cat: 'women', name: 'Aura Runners', price: 110, img: '👟', type: 'Shoes' },
            { id: 11, cat: 'women', name: 'Neon Ankle Socks', price: 12, img: '🧦', type: 'Socks' },
            { id: 12, cat: 'women', name: 'Signature Beanie', price: 25, img: '🧶', type: 'Hat' }
        ];

        function filterMerch(category) {
            // Update Buttons
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const grid = document.getElementById('merch-grid');
            const filtered = products.filter(p => p.cat === category);
            
            grid.innerHTML = filtered.map(p => `
                <div class="merch-card rounded-3xl p-6 flex flex-col items-center text-center">
                    <div class="text-6xl mb-6 py-10 bg-zinc-900/50 w-full rounded-2xl">${p.img}</div>
                    <p class="text-[10px] text-purple-500 uppercase font-black tracking-widest mb-1">${p.type}</p>
                    <h3 class="font-bold text-sm mb-4 uppercase">${p.name}</h3>
                    <p class="text-xl font-black mb-6">$${p.price}</p>
                    <a href="https://cash.app/\" class="w-full bg-white text-black py-3 rounded-xl text-[10px] font-black uppercase hover:bg-purple-600 hover:text-white transition">Buy Now</a>
                </div>
            `).join('');
        }

        // Initialize with Men's merch
        window.onload = () => filterMerch('men');
    </script>
</body>
</html>
